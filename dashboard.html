<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeathMarket - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0f; color: #e0e0e0; display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: #111118; border-right: 1px solid #222; padding: 20px 0; position: fixed; left: 0; top: 0; height: 100vh; }
        .sidebar-logo { padding: 0 20px 20px; font-size: 20px; font-weight: 700; color: #ff4757; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .sidebar a { display: block; padding: 12px 20px; color: #888; text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .sidebar a:hover, .sidebar a.active { color: #ff4757; background: rgba(255,71,87,0.1); border-right: 3px solid #ff4757; }
        .main { margin-left: 220px; flex: 1; padding: 30px 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; color: #fff; }
        .header span { color: #ff4757; }
        .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: #111118; border: 1px solid #222; border-radius: 12px; padding: 25px; }
        .card h3 { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .card .amount { font-size: 28px; font-weight: 700; color: #ff4757; }
        .card .sub { color: #2ed573; font-size: 12px; }
        .actions { display: flex; gap: 12px; margin-bottom: 30px; }
        .btn { padding: 12px 24px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; border: none; }
        .btn-primary { background: #ff4757; color: #fff; }
        .btn-outline { background: transparent; color: #ff4757; border: 2px solid #ff4757; }
        .section { background: #111118; border: 1px solid #222; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .section h3 { color: #ff4757; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0a0a0f; color: #888; padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #1a1a1a; color: #ccc; font-size: 13px; }
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .cards { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">💀 DeathMarket</div>
        <a href="/dashboard" class="active">📊 Dashboard</a>
        <a href="/trade">📈 Trade</a>
        <a href="/wallet">💰 Wallet</a>
        <a href="/market">📉 Market</a>
        <a href="/profile">👤 Profile</a>
        <a href="/admin">⚙️ Settings</a>
        <a href="#" onclick="logout()" style="color:#ff4757;">🚪 Sign Out</a>
    </div>
    <div class="main">
        <div class="header"><h1>Welcome, <span id="userName"></span></h1><div id="navUser" style="color:#888;"></div></div>
        <div class="cards">
            <div class="card"><h3>BTC Balance</h3><div class="amount" id="btcBalance">0.00</div><div class="sub">BTC</div></div>
            <div class="card"><h3>ETH Balance</h3><div class="amount" id="ethBalance">0.00</div><div class="sub">ETH</div></div>
            <div class="card"><h3>USDT Balance</h3><div class="amount" id="usdtBalance">$0.00</div><div class="sub">USDT</div></div>
        </div>
        <div class="actions">
            <a href="/trade" class="btn btn-primary">Trade Now</a>
            <a href="/wallet" class="btn btn-outline">Deposit / Withdraw</a>
        </div>
        <div class="section">
            <h3>Recent Orders</h3>
            <table><thead><tr><th>Date</th><th>Pair</th><th>Type</th><th>Amount</th><th>Price</th><th>Status</th></tr></thead><tbody id="ordersBody"></tbody></table>
        </div>
    </div>
    <script>
        async function loadDashboard() {
            const res = await fetch('/api/me');
            const user = await res.json();
            if (user.error) { window.location.href = '/login'; return; }
            document.getElementById('userName').textContent = user.full_name || user.username;
            document.getElementById('navUser').textContent = user.username + ' (' + user.role + ')';
            document.getElementById('btcBalance').textContent = parseFloat(user.balance_btc).toFixed(8);
            document.getElementById('ethBalance').textContent = parseFloat(user.balance_eth).toFixed(6);
            document.getElementById('usdtBalance').textContent = '$' + parseFloat(user.balance_usdt).toLocaleString();
            const ordersRes = await fetch('/api/orders/' + user.id);
            const orders = await ordersRes.json();
            document.getElementById('ordersBody').innerHTML = orders.slice(0,10).map(o => `<tr><td>${o.timestamp}</td><td>${o.pair}</td><td style="color:${o.type==='buy'?'#2ed573':'#ff4757'}">${o.type.toUpperCase()}</td><td>${o.amount}</td><td>$${parseFloat(o.price).toLocaleString()}</td><td>${o.status}</td></tr>`).join('');
        }
        function logout() { document.cookie.split(';').forEach(c => { document.cookie = c.trim().split('=')[0]+'=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/'; }); window.location.href='/'; }
        loadDashboard();
    </script>
</body>
</html>
