<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeathMarket - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0f; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .register-box { background: #111118; border: 1px solid #222; border-radius: 16px; padding: 45px; width: 420px; }
        .logo { text-align: center; margin-bottom: 10px; font-size: 28px; font-weight: 700; color: #ff4757; }
        .logo span { color: #ff6b81; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #888; font-size: 13px; font-weight: 500; }
        .form-group input { width: 100%; padding: 14px; background: #0a0a0f; border: 2px solid #222; border-radius: 8px; color: #fff; font-size: 15px; }
        .form-group input:focus { outline: none; border-color: #ff4757; }
        .btn-register { width: 100%; padding: 14px; background: #ff4757; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-register:hover { background: #ff3345; }
        .error { background: rgba(255,71,87,0.15); border: 1px solid #ff4757; color: #ff4757; padding: 12px; border-radius: 8px; margin-bottom: 18px; display: none; font-size: 13px; }
        .success { background: rgba(46,213,115,0.15); border: 1px solid #2ed573; color: #2ed573; padding: 12px; border-radius: 8px; margin-bottom: 18px; display: none; font-size: 13px; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #ff4757; text-decoration: none; font-size: 14px; }
        .links span { color: #444; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="register-box">
        <div class="logo">💀 Death<span>Market</span></div>
        <p class="subtitle">Create your account</p>
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        <form id="registerForm">
            <div class="form-group"><label>Full Name</label><input type="text" id="fullName" placeholder="Enter your full name"></div>
            <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="Choose a username" autocomplete="off"></div>
            <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="Enter your email"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Create a password"></div>
            <button type="submit" class="btn-register">Create Account</button>
        </form>
        <div class="links">
            <span>Have an account?</span><a href="/login">Sign In</a><span>|</span><a href="/">Home</a>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/api/register', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    full_name: document.getElementById('fullName').value,
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('success').innerHTML = 'Account created! Redirecting...';
                document.getElementById('success').style.display = 'block';
                setTimeout(() => window.location.href = '/dashboard', 1500);
            } else {
                document.getElementById('error').innerHTML = data.message;
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
